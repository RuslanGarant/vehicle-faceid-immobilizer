<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)" />
  
  <rect width="1280" height="4" fill="url(#accent)" />
  <rect width="1280" height="50" fill="url(#glow)" y="4" />

  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
    <line x1="900" y1="0" x2="900" y2="400" />
    <line x1="1100" y1="0" x2="1100" y2="400" />
    <line x1="0" y1="100" x2="1280" y2="100" />
    <line x1="0" y1="200" x2="1280" y2="200" />
    <line x1="0" y1="300" x2="1280" y2="300" />
  </g>

  <text x="640" y="140" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="54" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="6">GARANT-FLEET AI</text>
  
  <text x="640" y="190" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#a0aec0" text-anchor="middle" letter-spacing="2">INTEGRATED INTELLIGENT ANALYTICS &amp; REAL-TIME MONITORING PLATFORM</text>

  <line x1="440" y1="230" x2="840" y2="230" stroke="#4facfe" stroke-opacity="0.3" stroke-width="2" />

  <g font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="15" font-weight="600" letter-spacing="1">
    <rect x="190" y="265" width="260" height="45" rx="6" fill="#111827" stroke="#00f2fe" stroke-opacity="0.4" stroke-width="1"/>
    <text x="320" y="293" fill="#edf2f7" text-anchor="middle">Garant-Fleet ID Framework</text>

    <rect x="510" y="265" width="260" height="45" rx="6" fill="#111827" stroke="#00f2fe" stroke-opacity="0.4" stroke-width="1"/>
    <text x="640" y="293" fill="#edf2f7" text-anchor="middle">Garant-Fleet DSM Engine</text>

    <rect x="830" y="265" width="260" height="45" rx="6" fill="#111827" stroke="#00f2fe" stroke-opacity="0.4" stroke-width="1"/>
    <text x="960" y="293" fill="#edf2f7" text-anchor="middle">Garant-Fleet Fuel System</text>
  </g>

  <text x="640" y="360" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#718096" text-anchor="middle" letter-spacing="1">Enterprise Infrastructure for Commercial Fleet Safety &amp; Asset Protection</text>
</svg>
